<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRORUTINAS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; background: #f4f4f7; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .bg-stripes { background-image: repeating-linear-gradient(45deg, #000, #000 12px, transparent 12px, transparent 24px); }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; height: 22px; width: 22px; border-radius: 999px;
      background: #3ca9a6; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.15); cursor: pointer;
    }
    input[type=range] {
      background: #e4e4e7; height: 4px; border-radius: 999px; -webkit-appearance: none; appearance: none;
    }
    @media print {
      @page { margin: 0; size: A4 landscape; }
      body { background: white !important; }
      .print\:hidden { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const CATEGORIES_ORDER = [
      "MOVILIDAD Y ACTIVACIÓN ESCAPULAR",
      "CORE / ESCÁPULA / ESTABILIDAD",
      "MOVILIDAD CADENA POSTERIOR",
      "FUERZA TREN INFERIOR / POTENCIA",
      "FUERZA TREN SUPERIOR",
      "FUERZA INTEGRADA (PIERNAS + BRAZOS)",
      "PERSONALIZADOS"
    ];

    const INITIAL_LIBRARY = [
      { nombre: "Elongación fascia con control respiratorio", cat: "MOVILIDAD Y ACTIVACIÓN ESCAPULAR", tipo: "movilidad", order: 0 },
      { nombre: "Elongación psoas dinámica", cat: "MOVILIDAD Y ACTIVACIÓN ESCAPULAR", tipo: "movilidad", order: 1 },
      { nombre: "Estocada con rotación contraria con pesa rusa", cat: "MOVILIDAD Y ACTIVACIÓN ESCAPULAR", tipo: "movilidad", order: 2 },
      { nombre: "Postura caballero manos juntas mov. escapular", cat: "MOVILIDAD Y ACTIVACIÓN ESCAPULAR", tipo: "movilidad", order: 3 },
      { nombre: "Spiderman (toco tobillos rotando)", cat: "MOVILIDAD Y ACTIVACIÓN ESCAPULAR", tipo: "movilidad", order: 4 },
      { nombre: "Tocar rodillas en rotación", cat: "MOVILIDAD Y ACTIVACIÓN ESCAPULAR", tipo: "movilidad", order: 5 },
      { nombre: "Espinales + movilidad escapular alternada", cat: "MOVILIDAD Y ACTIVACIÓN ESCAPULAR", tipo: "movilidad", order: 6 },
      { nombre: "Retracción escapular con banda en codos", cat: "MOVILIDAD Y ACTIVACIÓN ESCAPULAR", tipo: "movilidad", order: 7 },
      { nombre: "Rotación externa de hombro con banda", cat: "MOVILIDAD Y ACTIVACIÓN ESCAPULAR", tipo: "movilidad", order: 8 },
      { nombre: "Superman", cat: "CORE / ESCÁPULA / ESTABILIDAD", tipo: "core", order: 0 },
      { nombre: "Plancha alta con transferencia de mancuerna", cat: "CORE / ESCÁPULA / ESTABILIDAD", tipo: "core", order: 1 },
      { nombre: "Plancha apertura lateral y diagonal banda", cat: "CORE / ESCÁPULA / ESTABILIDAD", tipo: "core", order: 2 },
      { nombre: "Plancha baja rotación escapular mancuerna", cat: "CORE / ESCÁPULA / ESTABILIDAD", tipo: "core", order: 3 },
      { nombre: "Plancha alta a baja rodillas pecho", cat: "CORE / ESCÁPULA / ESTABILIDAD", tipo: "core", order: 4 },
      { nombre: "Oblicuos con pesa rusa", cat: "CORE / ESCÁPULA / ESTABILIDAD", tipo: "core", order: 5 },
      { nombre: "Bicho muerto (y sus variantes)", cat: "CORE / ESCÁPULA / ESTABILIDAD", tipo: "core", order: 6 },
      { nombre: "Pallof press arrodillado", cat: "CORE / ESCÁPULA / ESTABILIDAD", tipo: "estabilidad", order: 7 },
      { nombre: "Plancha lateral mancuerna + flexión rodilla", cat: "CORE / ESCÁPULA / ESTABILIDAD", tipo: "core", order: 8 },
      { nombre: "Vitalización caballero kettlebell invertida", cat: "CORE / ESCÁPULA / ESTABILIDAD", tipo: "core", order: 9 },
      { nombre: "Aductores banco plancha lateral (Copenhague)", cat: "CORE / ESCÁPULA / ESTABILIDAD", tipo: "core", order: 10 },
      { nombre: "Bisagra de cadera con banda", cat: "MOVILIDAD CADENA POSTERIOR", tipo: "movilidad", order: 0 },
      { nombre: "Peso muerto rumano técnico", cat: "MOVILIDAD CADENA POSTERIOR", tipo: "movilidad", order: 1 },
      { nombre: "Saltos laterales alternados sobre cajón", cat: "FUERZA TREN INFERIOR / POTENCIA", tipo: "fuerza", order: 0 },
      { nombre: "Peso muerto con barra", cat: "FUERZA TREN INFERIOR / POTENCIA", tipo: "fuerza", order: 1 },
      { nombre: "Búlgaras con vuelos laterales", cat: "FUERZA TREN INFERIOR / POTENCIA", tipo: "fuerza", order: 2 },
      { nombre: "Sentadilla tocando tobillos alternados", cat: "FUERZA TREN INFERIOR / POTENCIA", tipo: "fuerza", order: 3 },
      { nombre: "Subida al cajón con mancuernas + press hombro", cat: "FUERZA TREN INFERIOR / POTENCIA", tipo: "fuerza", order: 4 },
      { nombre: "Dominadas", cat: "FUERZA TREN SUPERIOR", tipo: "fuerza", order: 0 },
      { nombre: "Dominadas con peso", cat: "FUERZA TREN SUPERIOR", tipo: "fuerza", order: 1 },
      { nombre: "Flexiones con remo", cat: "FUERZA TREN SUPERIOR", tipo: "fuerza", order: 2 },
      { nombre: "Remo con banda elástica", cat: "FUERZA TREN SUPERIOR", tipo: "fuerza", order: 3 },
      { nombre: "Burpees", cat: "FUERZA INTEGRADA (PIERNAS + BRAZOS)", tipo: "fuerza", order: 0 },
      { nombre: "Peso muerto unipodal + press hombro pot", cat: "FUERZA INTEGRADA (PIERNAS + BRAZOS)", tipo: "fuerza", order: 1 }
    ];

    const TEMPLATES = {
      POSTURAL: [
        { type: 'single', name: 'Elongación psoas dinámica', series: '3', reps: '10', peso: '-', tipo: 'movilidad' },
        { type: 'single', name: 'Pallof press arrodillado', series: '3', reps: '12', peso: 'banda', tipo: 'estabilidad' },
        { type: 'single', name: 'Bisagra de cadera con banda', series: '3', reps: '12', peso: '-', tipo: 'movilidad' }
      ],
      LUMBALGIA: [
        { type: 'single', name: 'Bicho muerto (y sus variantes)', series: '3', reps: '8', peso: '-', tipo: 'core' },
        { type: 'single', name: 'Pallof press arrodillado', series: '3', reps: '10', peso: 'banda', tipo: 'estabilidad' },
        { type: 'single', name: 'Peso muerto rumano técnico', series: '3', reps: '8', peso: 'ligero', tipo: 'movilidad' }
      ],
      FUERZA_BASE: [
        { type: 'single', name: 'Peso muerto con barra', series: '4', reps: '6', peso: 'moderado', tipo: 'fuerza' },
        { type: 'single', name: 'Dominadas', series: '4', reps: '6', peso: 'pc', tipo: 'fuerza' },
        { type: 'single', name: 'Subida al cajón con mancuernas + press hombro', series: '3', reps: '8', peso: 'moderado', tipo: 'fuerza' }
      ]
    };

    const DEFAULT_STATE = {
      patientData: {
        nombre: '', objetivo: '', fecha: new Date().toISOString().split('T')[0],
        logoUrl: '', labelNombre: 'NOMBRE:', labelObjetivo: 'OBJETIVO:', labelDia: 'DÍA',
        mainTitle1: 'PRORUTINAS', mainTitle2: 'ELITE TRAINING',
        footerText: 'RECORDA QUE SIEMPRE PODES PEDIR UNA VARIANTE A TU EJERCICIO',
        blocks: {
          banner: { x: 40, y: 30, w: 220, h: 80 },
          titles: { x: 650, y: 30, w: 400, h: 100 },
          dataBox: { x: 40, y: 130, w: 680, h: 100 },
          dateBox: { x: 740, y: 130, w: 260, h: 100 }
        }
      },
      days: [{ id: Date.now(), items: [{ id: Date.now() + 1, type: 'single', name: '', series: '', reps: '', peso: '', tipo: 'fuerza' }] }],
      config: {
        pageScale: 75, routineY: 280, routineX: 0, dayGap: 60, rowHeight: 65,
        borderWidth: 2, borderRadius: 45, routineWidth: 100, cellPaddingV: 6, footerMarginTop: 36,
        fonts: { ex: 16, day: 45, headers: 10, patientName: 24, patientLabels: 10, footer: 20, main: 50, dateText: 45 },
        colWidths: { ex: 55, series: 15, reps: 15, peso: 15 },
        pos: { diaX: 0, headersY: 6 },
        style: { dividerOpacity: 30, sheetBg: '#ffffff', appBg: '#f4f4f7' }
      }
    };

    const getExTypeStyles = (tipo) => {
      const map = {
        movilidad: { bg: 'bg-sky-100', text: 'text-sky-700', border: 'border-sky-200' },
        core: { bg: 'bg-amber-100', text: 'text-amber-700', border: 'border-amber-200' },
        fuerza: { bg: 'bg-emerald-100', text: 'text-emerald-700', border: 'border-emerald-200' },
        estabilidad: { bg: 'bg-slate-100', text: 'text-slate-700', border: 'border-slate-200' }
      };
      return map[tipo] || { bg: 'bg-white', text: 'text-zinc-800', border: 'border-zinc-200' };
    };

    const makeId = () => Date.now() + Math.floor(Math.random() * 100000);

    function App() {
      const [patientData, setPatientData] = useState(DEFAULT_STATE.patientData);
      const [days, setDays] = useState(DEFAULT_STATE.days);
      const [config, setConfig] = useState(DEFAULT_STATE.config);
      const [saveStatus, setSaveStatus] = useState('idle');
      const [editMode, setEditMode] = useState(false);
      const [labMode, setLabMode] = useState(false);
      const [assetsOpen, setAssetsOpen] = useState(false);
      const [assetTab, setAssetTab] = useState('library');
      const [selectorOpen, setSelectorOpen] = useState(null);
      const [savedRoutines, setSavedRoutines] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');
      const [routineName, setRoutineName] = useState('');
      const [libraryEditMode, setLibraryEditMode] = useState(false);
      const [newExNames, setNewExNames] = useState({});
      const [cloudExercises, setCloudExercises] = useState([]);
      const fileInputRef = useRef(null);
      const [activeAction, setActiveAction] = useState(null);
      const [startPoint, setStartPoint] = useState({ x: 0, y: 0, w: 0, h: 0 });
      const [viewportWidth, setViewportWidth] = useState(typeof window !== 'undefined' ? window.innerWidth : 1280);

      useEffect(() => {
        const savedSession = localStorage.getItem('prorutinas_session_v1');
        const savedLibrary = localStorage.getItem('prorutinas_library_v1');
        const savedPlans = localStorage.getItem('prorutinas_plans_v1');

        if (savedSession) {
          const parsed = JSON.parse(savedSession);
          setPatientData(parsed.patientData || DEFAULT_STATE.patientData);
          setDays(parsed.days || DEFAULT_STATE.days);
          setConfig(parsed.config || DEFAULT_STATE.config);
        }
        if (savedLibrary) setCloudExercises(JSON.parse(savedLibrary));
        else setCloudExercises(INITIAL_LIBRARY.map((ex, idx) => ({ id: 'lib-' + idx, ...ex })));
        if (savedPlans) setSavedRoutines(JSON.parse(savedPlans));
      }, []);

      useEffect(() => {
        const timer = setTimeout(() => {
          localStorage.setItem('prorutinas_session_v1', JSON.stringify({ patientData, days, config }));
          localStorage.setItem('prorutinas_library_v1', JSON.stringify(cloudExercises));
          localStorage.setItem('prorutinas_plans_v1', JSON.stringify(savedRoutines));
          setSaveStatus('saved');
          setTimeout(() => setSaveStatus('idle'), 1200);
        }, 400);
        return () => clearTimeout(timer);
      }, [patientData, days, config, cloudExercises, savedRoutines]);

      useEffect(() => {
        const onResize = () => setViewportWidth(window.innerWidth);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);

      const handlePointerDown = (e, block, type) => {
        if (!editMode) return;
        e.stopPropagation();
        setActiveAction({ type, block });
        const b = patientData.blocks[block];
        setStartPoint({ x: e.clientX, y: e.clientY, w: b.w, h: b.h });
      };

      const effectiveScale = viewportWidth < 768
        ? Math.min(0.55, Math.max(0.28, (viewportWidth - 22) / 1122))
        : config.pageScale / 100;

      const handlePointerMove = (e) => {
        if (!activeAction) return;
        const dx = (e.clientX - startPoint.x) / effectiveScale;
        const dy = (e.clientY - startPoint.y) / effectiveScale;
        setPatientData(prev => {
          const curr = prev.blocks[activeAction.block];
          const next = { ...curr };
          if (activeAction.type === 'move') {
            next.x = curr.x + dx;
            next.y = curr.y + dy;
          } else {
            next.w = Math.max(80, startPoint.w + dx);
            next.h = Math.max(40, startPoint.h + dy);
          }
          return { ...prev, blocks: { ...prev.blocks, [activeAction.block]: next } };
        });
        setStartPoint(prev => ({ ...prev, x: e.clientX, y: e.clientY }));
      };

      const handlePointerUp = () => setActiveAction(null);

      const handleImageUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => setPatientData(prev => ({ ...prev, logoUrl: reader.result }));
        reader.readAsDataURL(file);
      };

      const handleReset = () => {
        if (!confirm('¿Reiniciar rutina completa?')) return;
        setPatientData(DEFAULT_STATE.patientData);
        setDays(DEFAULT_STATE.days);
        setConfig(DEFAULT_STATE.config);
      };

      const addNewDay = () => setDays(prev => [...prev, { id: makeId(), items: [{ id: makeId(), type: 'single', name: '', series: '', reps: '', peso: '', tipo: 'fuerza' }] }]);
      const removeDayById = (id) => {
        if (days.length <= 1) return;
        if (!confirm('¿Borrar este día?')) return;
        setDays(prev => prev.filter(d => d.id !== id));
      };
      const duplicateDay = (day) => setDays(prev => [...prev, { ...day, id: makeId(), items: day.items.map(i => ({ ...i, id: makeId() })) }]);
      const addExerciseToDay = (dayId) => setDays(prev => prev.map(d => d.id === dayId ? { ...d, items: [...d.items, { id: makeId(), type: 'single', name: '', series: '', reps: '', peso: '', tipo: 'fuerza' }] } : d));
      const addComboToDay = (dayId) => setDays(prev => prev.map(d => {
        if (d.id !== dayId) return d;
        const label = String.fromCharCode(65 + d.items.filter(i => i.type === 'combo').length);
        return {
          ...d,
          items: [...d.items, { id: makeId(), type: 'combo', label, sharedSeries: '', sharedReps: '', exercises: [{ name: '', peso: '', tipo: 'fuerza' }, { name: '', peso: '', tipo: 'fuerza' }] }]
        };
      }));
      const removeRow = (dayId, itemId) => setDays(prev => prev.map(d => d.id === dayId ? { ...d, items: d.items.filter(i => i.id !== itemId) } : d));

      const updateField = (dayId, itemId, field, value, subId = null) => {
        setDays(prev => prev.map(d => d.id === dayId ? {
          ...d,
          items: d.items.map(item => {
            if (item.id !== itemId) return item;
            if (subId !== null && item.type === 'combo') {
              const exs = [...item.exercises];
              exs[subId] = { ...exs[subId], [field]: value };
              return { ...item, exercises: exs };
            }
            return { ...item, [field]: value };
          })
        } : d));
      };

      const selectFromLibrary = (exercise) => {
        if (!selectorOpen) return;
        const { dayId, itemId, subId } = selectorOpen;
        setDays(prev => prev.map(d => d.id === dayId ? {
          ...d,
          items: d.items.map(i => {
            if (i.id !== itemId) return i;
            if (i.type === 'combo') {
              return {
                ...i,
                exercises: i.exercises.map((ex, idx) => idx === subId ? { ...ex, name: exercise.nombre, tipo: exercise.tipo } : ex)
              };
            }
            return { ...i, name: exercise.nombre, tipo: exercise.tipo };
          })
        } : d));
        setSelectorOpen(null);
      };

      const handleUpdateExValue = (id, field, value) => {
        setCloudExercises(prev => prev.map(ex => ex.id === id ? { ...ex, [field]: value } : ex));
      };
      const moveExInLibrary = (id, direction) => {
        setCloudExercises(prev => prev.map(ex => ex.id === id ? { ...ex, order: (ex.order || 0) + direction } : ex));
      };
      const handleDeleteExercise = (id) => {
        if (!confirm('¿Eliminar ejercicio?')) return;
        setCloudExercises(prev => prev.filter(ex => ex.id !== id));
      };
      const handleAddNewExercise = (cat) => {
        const name = newExNames[cat];
        if (!name || !name.trim()) return;
        setCloudExercises(prev => [...prev, { id: makeId(), nombre: name.trim(), cat, tipo: 'fuerza', order: 999 }]);
        setNewExNames(prev => ({ ...prev, [cat]: '' }));
      };

      const fullLibrary = useMemo(() => {
        const lib = {};
        CATEGORIES_ORDER.forEach(cat => lib[cat] = []);
        [...cloudExercises].sort((a, b) => (a.order || 0) - (b.order || 0)).forEach(ex => {
          const cat = ex.cat || 'PERSONALIZADOS';
          if (!lib[cat]) lib[cat] = [];
          lib[cat].push(ex);
        });
        return lib;
      }, [cloudExercises]);

      const applyTemplate = (key) => {
        const base = TEMPLATES[key] || [];
        const newDay = {
          id: makeId(),
          items: base.map(item => ({ ...item, id: makeId() }))
        };
        setDays([newDay]);
        setAssetsOpen(false);
      };

      const saveCurrentRoutine = () => {
        const name = routineName.trim();
        if (!name) {
          alert('Escribí un nombre para guardar la rutina.');
          return;
        }
        const plan = { id: makeId(), name, createdAt: new Date().toLocaleString('es-AR'), patientData, days, config };
        setSavedRoutines(prev => [plan, ...prev]);
        setRoutineName('');
      };

      const loadRoutine = (plan) => {
        setPatientData(plan.patientData);
        setDays(plan.days);
        setConfig(plan.config);
        setAssetsOpen(false);
      };

      const deleteRoutine = (id) => {
        if (!confirm('¿Eliminar rutina guardada?')) return;
        setSavedRoutines(prev => prev.filter(r => r.id !== id));
      };

      const saveBadge = saveStatus === 'saved' ? 'Guardado' : saveStatus === 'saving' ? 'Guardando' : 'Autosave local';
      const autoScale = effectiveScale;

      return (
        <div className="min-h-screen flex relative overflow-hidden" style={{ backgroundColor: config.style.appBg }} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp}>
          <div className="fixed left-3 top-3 md:left-6 md:top-6 z-[700] print:hidden bg-white/90 backdrop-blur rounded-full border border-zinc-200 px-3 py-1.5 md:px-4 md:py-2 text-[10px] md:text-xs font-bold uppercase tracking-wide text-zinc-600 shadow">
            {saveBadge}
          </div>

          <div className="fixed bottom-3 left-1/2 -translate-x-1/2 md:left-auto md:right-6 md:top-1/2 md:-translate-y-1/2 md:translate-x-0 flex flex-row md:flex-col items-center gap-2 md:gap-4 z-[500] print:hidden bg-white/70 md:bg-transparent backdrop-blur-xl md:backdrop-blur-0 p-2 md:p-0 rounded-2xl md:rounded-none border border-zinc-200/70 md:border-none">
            <button onClick={() => { setEditMode(!editMode); setLabMode(false); }} className={`w-11 h-11 md:w-16 md:h-16 text-[11px] md:text-sm rounded-2xl md:rounded-full shadow-lg md:shadow-xl flex items-center justify-center border-2 md:border-4 transition-all ${editMode ? 'bg-teal-500 border-white text-white' : 'bg-white border-zinc-100 text-zinc-600'}`}>Mover</button>
            <button onClick={() => { setLabMode(!labMode); setEditMode(false); }} className={`w-11 h-11 md:w-16 md:h-16 text-[11px] md:text-sm rounded-2xl md:rounded-full shadow-lg md:shadow-xl flex items-center justify-center border-2 md:border-4 transition-all ${labMode ? 'bg-amber-500 border-white text-white' : 'bg-white border-zinc-100 text-zinc-600'}`}>Diseño</button>
            <div className="hidden md:flex flex-col bg-white rounded-3xl shadow-xl border border-zinc-100 overflow-hidden">
              {[100, 75, 50].map(s => (
                <button key={s} onClick={() => setConfig({ ...config, pageScale: s })} className={`w-14 h-12 text-xs font-black border-b last:border-b-0 ${config.pageScale === s ? 'bg-teal-500 text-white' : 'text-zinc-500 bg-white'}`}>{s}%</button>
              ))}
            </div>
            <button onClick={() => setAssetsOpen(true)} className="w-11 h-11 md:w-16 md:h-16 text-[11px] md:text-sm bg-white rounded-2xl md:rounded-full shadow-lg md:shadow-xl border border-zinc-100 text-zinc-600">Recursos</button>
            <button onClick={() => window.print()} className="w-11 h-11 md:w-16 md:h-16 text-[11px] md:text-sm bg-white rounded-2xl md:rounded-full shadow-lg md:shadow-xl border border-zinc-100 text-zinc-600">PDF</button>
            <button onClick={handleReset} className="w-11 h-11 md:w-16 md:h-16 text-[11px] md:text-sm bg-white rounded-2xl md:rounded-full shadow-lg md:shadow-xl border border-zinc-100 text-zinc-600">Reset</button>
          </div>

          {labMode && (
            <div className="fixed left-3 right-3 md:left-6 md:right-auto top-16 md:top-1/2 md:-translate-y-1/2 w-auto md:w-96 bg-black/95 backdrop-blur-3xl border border-teal-400/30 rounded-[1.5rem] md:rounded-[2rem] p-4 md:p-8 z-[600] shadow-2xl text-white overflow-y-auto max-h-[78vh] md:max-h-[95vh] scrollbar-hide print:hidden">
              <h3 className="font-black text-lg md:text-2xl uppercase tracking-tight mb-6 md:mb-8">Diseño total</h3>
              <div className="space-y-8">
                <div className="space-y-4 bg-white/5 p-5 rounded-[1.5rem]">
                  <div className="text-xs font-black text-amber-400 uppercase">Layout</div>
                  <label className="block text-xs uppercase">Inicio Rutina (Y)</label>
                  <input type="range" min="100" max="800" value={config.routineY} onChange={e => setConfig({ ...config, routineY: parseInt(e.target.value) })} className="w-full" />
                  <label className="block text-xs uppercase">Altura Filas</label>
                  <input type="range" min="40" max="150" value={config.rowHeight} onChange={e => setConfig({ ...config, rowHeight: parseInt(e.target.value) })} className="w-full" />
                  <label className="block text-xs uppercase">Radio Bordes</label>
                  <input type="range" min="10" max="60" value={config.borderRadius} onChange={e => setConfig({ ...config, borderRadius: parseInt(e.target.value) })} className="w-full" />
                </div>
                <div className="space-y-4 bg-white/5 p-5 rounded-[1.5rem]">
                  <div className="text-xs font-black text-sky-400 uppercase">Columnas</div>
                  <label className="block text-xs uppercase">Ejercicio (%)</label>
                  <input type="range" min="30" max="80" value={config.colWidths.ex} onChange={e => {
                    const val = parseInt(e.target.value);
                    const rem = 100 - val;
                    setConfig({ ...config, colWidths: { ...config.colWidths, ex: val, series: rem / 3, reps: rem / 3, peso: rem / 3 } });
                  }} className="w-full" />
                  <label className="block text-xs uppercase">Tipografía ejercicio</label>
                  <input type="range" min="12" max="24" value={config.fonts.ex} onChange={e => setConfig({ ...config, fonts: { ...config.fonts, ex: parseInt(e.target.value) } })} className="w-full" />
                  <label className="block text-xs uppercase">Tipografía día</label>
                  <input type="range" min="24" max="64" value={config.fonts.day} onChange={e => setConfig({ ...config, fonts: { ...config.fonts, day: parseInt(e.target.value) } })} className="w-full" />
                </div>
              </div>
            </div>
          )}

          <div className="flex-grow flex flex-col items-center overflow-auto pt-14 pb-28 md:py-20 px-2 md:px-10 scrollbar-hide">
            <div className="origin-top transition-all duration-300" style={{ transform: `scale(${autoScale})` }}>
              <div className="bg-white shadow-[0_40px_130px_-20px_rgba(0,0,0,0.18)] overflow-hidden print:shadow-none relative rounded-sm" style={{ width: '297mm', minHeight: '210mm', backgroundColor: config.style.sheetBg }}>
                <div className="h-8 w-full bg-stripes opacity-10"></div>
                <div className="px-16 pt-12 pb-16 relative min-h-[1050px]">
                  {Object.entries(patientData.blocks).map(([key, block]) => (
                    <div key={key} className={`absolute group ${editMode ? 'ring-2 ring-teal-400 ring-dashed shadow-xl z-50' : ''}`} style={{ left: block.x, top: block.y, width: block.w, height: block.h }}>
                      <div onPointerDown={(e) => handlePointerDown(e, key, 'move')} className={`w-full h-full flex flex-col justify-center overflow-hidden ${editMode ? 'cursor-move' : ''}`}>
                        {key === 'banner' && (
                          <div className="w-full h-full flex items-center justify-center bg-zinc-50 rounded-2xl cursor-pointer border border-zinc-200" onClick={() => !editMode && fileInputRef.current?.click()}>
                            {patientData.logoUrl ? <img src={patientData.logoUrl} className="w-full h-full object-contain" /> : <span className="text-zinc-300 font-black uppercase text-sm">Logo</span>}
                            <input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={handleImageUpload} />
                          </div>
                        )}
                        {key === 'titles' && (
                          <div className="text-right">
                            <h1 className="font-black uppercase leading-none" style={{ fontSize: `${config.fonts.main}px` }}>{patientData.mainTitle1}</h1>
                            <h1 className="font-black text-teal-500 leading-none uppercase" style={{ fontSize: `${config.fonts.main * 0.8}px` }}>{patientData.mainTitle2}</h1>
                          </div>
                        )}
                        {key === 'dataBox' && (
                          <div className="flex flex-col gap-3">
                            <div className="flex border-b-2 border-teal-500/20 items-end pb-1">
                              <span className="font-black text-teal-500 mr-4 text-[10px]">{patientData.labelNombre}</span>
                              <input type="text" className="bg-transparent border-none outline-none flex-grow font-bold uppercase" style={{ fontSize: `${config.fonts.patientName}px` }} value={patientData.nombre} onChange={e => setPatientData({ ...patientData, nombre: e.target.value })} />
                            </div>
                            <div className="flex border-b-2 border-teal-500/20 items-end pb-1">
                              <span className="font-black text-teal-500 mr-4 text-[10px]">{patientData.labelObjetivo}</span>
                              <input type="text" className="bg-transparent border-none outline-none flex-grow font-bold uppercase" style={{ fontSize: `${config.fonts.patientName}px` }} value={patientData.objetivo} onChange={e => setPatientData({ ...patientData, objetivo: e.target.value })} />
                            </div>
                          </div>
                        )}
                        {key === 'dateBox' && (
                          <div className="flex items-center gap-3 font-black bg-zinc-50 p-4 rounded-3xl relative border border-zinc-200">
                            <span className="text-zinc-900 leading-none" style={{ fontSize: `${config.fonts.dateText}px` }}>{patientData.fecha.split('-')[2]}</span>
                            <div className="flex flex-col">
                              <span className="text-teal-500 uppercase text-xl">{new Intl.DateTimeFormat('es-ES', { month: 'short' }).format(new Date(patientData.fecha))}</span>
                              <span className="text-zinc-300 text-sm">{patientData.fecha.split('-')[0]}</span>
                            </div>
                            <input type="date" className="absolute inset-0 opacity-0 cursor-pointer" value={patientData.fecha} onChange={e => setPatientData({ ...patientData, fecha: e.target.value })} />
                          </div>
                        )}
                      </div>
                      {editMode && <div onPointerDown={(e) => handlePointerDown(e, key, 'resize')} className="absolute -bottom-3 -right-3 w-8 h-8 bg-teal-500 rounded-full flex items-center justify-center cursor-se-resize text-white text-xs shadow-xl">↘</div>}
                    </div>
                  ))}

                  <div style={{ height: `${config.routineY}px` }}></div>

                  <div style={{ width: `${config.routineWidth}%`, gap: `${config.dayGap}px`, transform: `translateX(${config.routineX}px)` }} className="mx-auto flex flex-col relative">
                    {days.map((day, dIdx) => (
                      <div key={day.id} className="flex flex-col relative group/day">
                        <div className="mb-4 flex items-baseline relative" style={{ paddingLeft: `${config.pos.diaX}px` }}>
                          <span className="font-black uppercase text-zinc-900" style={{ fontSize: `${config.fonts.day}px` }}>{patientData.labelDia}</span>
                          <span className="font-black text-teal-500 ml-1" style={{ fontSize: `${config.fonts.day}px` }}>{dIdx + 1}</span>
                          <div className="ml-8 flex gap-3 print:hidden opacity-0 group-hover/day:opacity-100 transition-all">
                            <button onClick={() => duplicateDay(day)} className="px-4 py-2 bg-zinc-50 border border-zinc-200 rounded-full text-teal-500">Duplicar</button>
                            <button onClick={() => removeDayById(day.id)} className="px-4 py-2 bg-zinc-50 border border-zinc-200 rounded-full text-red-400">Borrar</button>
                          </div>
                        </div>

                        <div className="flex-grow border-black bg-white overflow-hidden shadow-sm relative" style={{ borderWidth: `${config.borderWidth}px`, borderRadius: `${config.borderRadius}px` }}>
                          <div className="flex items-center bg-zinc-50 border-black py-4 text-[10px] font-black uppercase tracking-widest text-zinc-400" style={{ borderBottomWidth: `${config.borderWidth}px` }}>
                            <div style={{ width: `${config.colWidths.ex}%`, paddingLeft: '40px' }} className="text-teal-500 font-bold">Ejercicio Seleccionado</div>
                            <div style={{ width: `${config.colWidths.series}%`, borderLeftWidth: `${config.borderWidth}px`, borderLeftColor: `rgba(0,0,0,${config.style.dividerOpacity / 100})` }} className="text-center font-bold">Series</div>
                            <div style={{ width: `${config.colWidths.reps}%`, borderLeftWidth: `${config.borderWidth}px`, borderLeftColor: `rgba(0,0,0,${config.style.dividerOpacity / 100})` }} className="text-center font-bold">Reps</div>
                            <div style={{ width: `${config.colWidths.peso}%`, borderLeftWidth: `${config.borderWidth}px`, borderLeftColor: `rgba(0,0,0,${config.style.dividerOpacity / 100})` }} className="text-center font-bold">Peso</div>
                          </div>

                          {day.items.map((item, iIdx) => (
                            <div key={item.id} className="flex items-stretch border-black group/row hover:bg-teal-50/50" style={{ borderBottomWidth: iIdx !== day.items.length - 1 ? `${config.borderWidth}px` : '0px', minHeight: `${config.rowHeight}px` }}>
                              <div style={{ width: `${config.colWidths.ex}%`, padding: `${config.cellPaddingV}px 0` }} className="relative flex items-center">
                                {item.type === 'combo' && <div className="absolute left-2 top-2 bottom-2 w-1.5 bg-amber-400 rounded-full"></div>}
                                <div className="flex flex-col gap-1.5 pl-12 pr-6 w-full h-full justify-center">
                                  {item.type === 'single' ? (
                                    <button onClick={() => setSelectorOpen({ dayId: day.id, itemId: item.id })} className={`w-full text-left font-bold uppercase py-3 px-4 rounded-2xl border transition-all ${getExTypeStyles(item.tipo).bg} ${getExTypeStyles(item.tipo).border}`} style={{ fontSize: `${config.fonts.ex}px` }}>{item.name || 'Elegir...'}</button>
                                  ) : (
                                    item.exercises.map((ex, exIdx) => (
                                      <div key={exIdx} className="flex items-center gap-2">
                                        <span className="text-[9px] font-black text-amber-500 w-4">{item.label}{exIdx + 1}</span>
                                        <button onClick={() => setSelectorOpen({ dayId: day.id, itemId: item.id, subId: exIdx })} className={`flex-grow text-left font-bold uppercase py-2 px-4 rounded-xl border transition-all ${getExTypeStyles(ex.tipo).bg} ${getExTypeStyles(ex.tipo).border}`} style={{ fontSize: `${config.fonts.ex * 0.9}px` }}>{ex.name || 'Elegir...'}</button>
                                      </div>
                                    ))
                                  )}
                                </div>
                              </div>
                              <div style={{ width: `${config.colWidths.series}%`, borderLeftWidth: `${config.borderWidth}px`, borderLeftColor: `rgba(0,0,0,${config.style.dividerOpacity / 100})` }} className="flex items-center justify-center bg-white"><input type="text" className="w-full bg-transparent text-center font-black text-teal-500 outline-none" style={{ fontSize: `${config.fonts.ex * 1.5}px` }} value={item.type === 'combo' ? item.sharedSeries : item.series} onChange={e => updateField(day.id, item.id, item.type === 'combo' ? 'sharedSeries' : 'series', e.target.value)} /></div>
                              <div style={{ width: `${config.colWidths.reps}%`, borderLeftWidth: `${config.borderWidth}px`, borderLeftColor: `rgba(0,0,0,${config.style.dividerOpacity / 100})` }} className="flex items-center justify-center bg-white"><input type="text" className="w-full bg-transparent text-center font-black text-zinc-600 outline-none" style={{ fontSize: `${config.fonts.ex * 1.5}px` }} value={item.type === 'combo' ? item.sharedReps : item.reps} onChange={e => updateField(day.id, item.id, item.type === 'combo' ? 'sharedReps' : 'reps', e.target.value)} /></div>
                              <div style={{ width: `${config.colWidths.peso}%`, borderLeftWidth: `${config.borderWidth}px`, borderLeftColor: `rgba(0,0,0,${config.style.dividerOpacity / 100})` }} className="flex flex-col justify-center bg-white relative pr-8">
                                {item.type === 'single' ? (
                                  <input type="text" className="w-full bg-transparent text-center font-black text-zinc-400 outline-none" style={{ fontSize: `${config.fonts.ex * 1.4}px` }} value={item.peso} onChange={e => updateField(day.id, item.id, 'peso', e.target.value)} />
                                ) : (
                                  item.exercises.map((ex, exIdx) => <input key={exIdx} type="text" className="w-full bg-transparent text-center font-black text-zinc-400 outline-none mb-1" style={{ fontSize: `${config.fonts.ex * 1.2}px` }} value={ex.peso} onChange={e => updateField(day.id, item.id, 'peso', e.target.value, exIdx)} />)
                                )}
                                <button onClick={() => removeRow(day.id, item.id)} className="absolute right-2 top-1/2 -translate-y-1/2 text-red-400 opacity-0 group-hover/row:opacity-100 print:hidden">×</button>
                              </div>
                            </div>
                          ))}

                          <div className="h-16 flex items-center justify-center gap-4 bg-zinc-50/50 print:hidden border-t border-zinc-100">
                            <button onClick={() => addExerciseToDay(day.id)} className="px-5 py-3 bg-white border border-zinc-200 rounded-full text-zinc-600 shadow-sm">+ Ejercicio</button>
                            <button onClick={() => addComboToDay(day.id)} className="px-5 py-3 bg-white border border-zinc-200 rounded-full text-zinc-600 shadow-sm">+ Combo</button>
                          </div>
                        </div>
                      </div>
                    ))}

                    <div className="flex justify-center mt-12 print:hidden">
                      <button onClick={addNewDay} className="flex items-center gap-4 px-10 py-5 bg-black text-white rounded-[1.5rem] font-black text-sm uppercase shadow-2xl">Nuevo día de trabajo</button>
                    </div>
                  </div>

                  <div className="text-center" style={{ marginTop: `${config.footerMarginTop}px` }}>
                    <textarea className="bg-transparent border-none outline-none text-center font-black tracking-tight text-zinc-900 border-t-2 border-zinc-100 pt-10 uppercase leading-none px-12 w-full resize-none" style={{ fontSize: `${config.fonts.footer}px` }} rows="2" value={patientData.footerText} onChange={e => setPatientData(prev => ({ ...prev, footerText: e.target.value }))} />
                  </div>
                </div>
              </div>
            </div>
          </div>

          {assetsOpen && (
            <div className="fixed inset-0 bg-black/90 z-[1000] flex items-end md:items-center justify-center p-2 md:p-6 backdrop-blur-3xl print:hidden">
              <div className="bg-white w-full max-w-6xl h-[92vh] md:h-[90vh] rounded-t-[1.5rem] md:rounded-[3rem] border-2 md:border-4 border-black flex flex-col relative">
                <div className="bg-teal-500 p-4 md:p-8 text-white flex justify-between items-center shrink-0 border-b-2 md:border-b-4 border-black">
                  <div className="flex gap-3 md:gap-8 flex-wrap">
                    {['library', 'templates', 'saved'].map(t => (
                      <button key={t} onClick={() => setAssetTab(t)} className={`font-black text-sm md:text-2xl uppercase tracking-tight ${assetTab === t ? 'underline underline-offset-4 md:underline-offset-8' : 'opacity-60'}`}>
                        {t === 'templates' ? 'Plantillas' : t === 'library' ? 'Biblioteca' : 'Guardadas'}
                      </button>
                    ))}
                  </div>
                  <button onClick={() => setAssetsOpen(false)} className="bg-black/20 px-3 py-2 md:px-5 md:py-3 rounded-full text-xs md:text-base">Cerrar</button>
                </div>

                <div className="flex-grow overflow-y-auto p-4 md:p-10 bg-white pb-28">
                  {assetTab === 'library' && (
                    <div className="space-y-10">
                      <div className="p-4 bg-zinc-50 rounded-full border border-zinc-200 flex items-center gap-4">
                        <input type="text" placeholder="Buscar ejercicio..." className="bg-transparent outline-none w-full text-xl uppercase font-black" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                      </div>
                      {Object.entries(fullLibrary).map(([cat, ejercicios]) => (
                        <div key={cat} className="mb-10">
                          <div className="flex justify-between items-center border-b-2 border-teal-500/20 pb-3 mb-6">
                            <h4 className="font-black text-xl text-teal-500 uppercase tracking-widest">{cat}</h4>
                          </div>
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {ejercicios.filter(ex => ex.nombre.toLowerCase().includes(searchTerm.toLowerCase())).map((ex) => (
                              <div key={ex.id} className="flex items-center p-5 rounded-[1.5rem] border bg-white border-zinc-200 hover:border-teal-500 transition-all group">
                                <div className="flex-grow text-left">
                                  {libraryEditMode ? (
                                    <input className="bg-zinc-50 border-none outline-none w-full font-bold uppercase text-base p-2 rounded-xl mb-2" value={ex.nombre} onChange={e => handleUpdateExValue(ex.id, 'nombre', e.target.value)} />
                                  ) : (
                                    <span className="font-bold text-lg uppercase block leading-tight">{ex.nombre}</span>
                                  )}
                                  <div className="flex gap-2 mt-2 items-center flex-wrap">
                                    <span className={`text-[10px] font-black px-3 py-1 rounded-full border uppercase ${getExTypeStyles(ex.tipo).bg} ${getExTypeStyles(ex.tipo).text}`}>{ex.tipo}</span>
                                    {libraryEditMode && (
                                      <select className="text-[10px] font-black bg-zinc-100 rounded-full px-4 py-1 border-none cursor-pointer" value={ex.cat} onChange={e => handleUpdateExValue(ex.id, 'cat', e.target.value)}>
                                        {CATEGORIES_ORDER.map(c => <option key={c} value={c}>{c}</option>)}
                                      </select>
                                    )}
                                  </div>
                                </div>
                                {libraryEditMode && (
                                  <div className="flex items-center gap-2 ml-4">
                                    <button onClick={() => moveExInLibrary(ex.id, -1)} className="px-2 py-1 text-zinc-400">↑</button>
                                    <button onClick={() => moveExInLibrary(ex.id, 1)} className="px-2 py-1 text-zinc-400">↓</button>
                                  </div>
                                )}
                                <button onClick={() => handleDeleteExercise(ex.id)} className="ml-4 px-3 py-2 text-red-400 opacity-0 group-hover:opacity-100 transition-all">Eliminar</button>
                              </div>
                            ))}
                            <div className="mt-2 border-2 border-dashed border-zinc-200 rounded-[1.5rem] p-5 flex items-center gap-4 bg-zinc-50/30">
                              <input type="text" placeholder={`Sumar a ${cat}...`} className="flex-grow bg-transparent outline-none font-bold uppercase text-base" value={newExNames[cat] || ''} onChange={e => setNewExNames({ ...newExNames, [cat]: e.target.value })} />
                              <button onClick={() => handleAddNewExercise(cat)} className="px-5 py-3 bg-teal-500 text-white rounded-2xl shadow-lg">Agregar</button>
                            </div>
                          </div>
                        </div>
                      ))}
                      <button onClick={() => setLibraryEditMode(!libraryEditMode)} className="fixed bottom-24 md:bottom-10 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 md:px-10 md:py-5 text-xs md:text-base rounded-full font-black uppercase shadow-2xl z-[1001]">
                        {libraryEditMode ? 'Cerrar edición' : 'Editar biblioteca'}
                      </button>
                    </div>
                  )}

                  {assetTab === 'templates' && (
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                      {Object.keys(TEMPLATES).map(k => (
                        <button key={k} onClick={() => applyTemplate(k)} className="p-10 bg-zinc-50 border-2 border-zinc-200 rounded-[2rem] hover:border-teal-500 transition-all text-left uppercase font-black text-3xl tracking-tight">{k}</button>
                      ))}
                    </div>
                  )}

                  {assetTab === 'saved' && (
                    <div className="space-y-6">
                      <div className="flex gap-4">
                        <input type="text" placeholder="Nombre de rutina" className="flex-grow bg-zinc-50 border border-zinc-200 rounded-2xl px-5 py-4 outline-none font-bold uppercase" value={routineName} onChange={e => setRoutineName(e.target.value)} />
                        <button onClick={saveCurrentRoutine} className="px-6 py-4 bg-black text-white rounded-2xl font-black uppercase">Guardar actual</button>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {savedRoutines.length === 0 && <div className="text-zinc-400 font-bold uppercase">No hay rutinas guardadas.</div>}
                        {savedRoutines.map(plan => (
                          <div key={plan.id} className="border border-zinc-200 rounded-[1.5rem] p-6 bg-zinc-50">
                            <div className="font-black uppercase text-xl">{plan.name}</div>
                            <div className="text-sm text-zinc-500 mt-1">{plan.createdAt}</div>
                            <div className="flex gap-3 mt-5">
                              <button onClick={() => loadRoutine(plan)} className="px-4 py-3 bg-teal-500 text-white rounded-xl font-black uppercase">Cargar</button>
                              <button onClick={() => deleteRoutine(plan.id)} className="px-4 py-3 bg-white border border-zinc-200 text-red-400 rounded-xl font-black uppercase">Eliminar</button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {selectorOpen && (
            <div className="fixed inset-0 bg-black/85 z-[1100] flex items-end md:items-center justify-center p-2 md:p-6 backdrop-blur-3xl print:hidden">
              <div className="bg-white w-full max-w-4xl h-[88vh] md:h-[80vh] rounded-t-[1.5rem] md:rounded-[3rem] border-2 md:border-4 border-black flex flex-col">
                <div className="p-4 md:p-8 bg-zinc-900 text-white flex justify-between items-center shrink-0">
                  <h3 className="font-black text-base md:text-3xl uppercase tracking-tight">Elegir ejercicio</h3>
                  <button onClick={() => { setSelectorOpen(null); setSearchTerm(''); }} className="px-3 py-2 md:px-5 md:py-3 bg-white/10 rounded-full text-xs md:text-base">Cerrar</button>
                </div>
                <div className="p-4 md:p-6 bg-zinc-50 border-b border-black/5 flex items-center gap-4 shrink-0">
                  <input type="text" placeholder="Buscar por nombre..." className="bg-transparent outline-none w-full text-base md:text-xl font-black uppercase text-teal-500" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} autoFocus />
                </div>
                <div className="flex-grow overflow-y-auto p-4 md:p-10 bg-white pb-20">
                  {Object.entries(fullLibrary).map(([cat, ejercicios]) => {
                    const filtered = ejercicios.filter(ex => ex.nombre.toLowerCase().includes(searchTerm.toLowerCase()));
                    if (filtered.length === 0) return null;
                    return (
                      <div key={cat} className="mb-10">
                        <h4 className="text-[10px] font-black text-zinc-300 uppercase tracking-widest mb-4 border-b border-zinc-100 pb-1">{cat}</h4>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                          {filtered.map((ex) => (
                            <button key={ex.id} onClick={() => selectFromLibrary(ex)} className="p-5 bg-zinc-50 hover:bg-teal-500 hover:text-white rounded-[1.5rem] text-left transition-all group border border-transparent">
                              <span className="font-bold text-lg uppercase block">{ex.nombre}</span>
                              <span className="text-[9px] font-black opacity-60 uppercase tracking-widest">{ex.tipo}</span>
                            </button>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
